<svg width="600" height="600" viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <circle cx="300" cy="300" r="280" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Abstract flowing lines -->
  <path d="M100 200 Q200 150 300 200 T500 200" stroke="url(#gradient2)" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M80 250 Q250 200 420 250 T600 250" stroke="url(#gradient2)" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M120 300 Q280 250 440 300 T600 300" stroke="url(#gradient2)" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Circular elements -->
  <circle cx="200" cy="180" r="40" fill="url(#gradient3)" opacity="0.3"/>
  <circle cx="450" cy="320" r="60" fill="url(#gradient3)" opacity="0.25"/>
  <circle cx="350" cy="450" r="50" fill="url(#gradient3)" opacity="0.2"/>
  
  <!-- Wave patterns -->
  <path d="M150 400 Q250 350 350 400 T550 400" stroke="url(#gradient2)" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M100 450 Q300 400 500 450" stroke="url(#gradient2)" stroke-width="2.5" fill="none" opacity="0.3"/>
  
  <!-- Small accent dots -->
  <circle cx="180" cy="280" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="420" cy="200" r="4" fill="#6366f1" opacity="0.6"/>
  <circle cx="320" cy="380" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="480" cy="380" r="4" fill="#6366f1" opacity="0.6"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>




